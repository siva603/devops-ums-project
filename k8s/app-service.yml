#================================================================
# Spring Boot App Service - External access (NodePort)
#================================================================
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-app-service
  namespace: spring-app
  labels:
    app: spring-boot-app
spec:
  selector:
    app: spring-boot-app
  ports:
    - port: 8080
      targetPort: 8080
      # NodePort: Access from outside cluster
      nodePort: 30080
      protocol: TCP
  # NodePort allows external access
  type: NodePort
