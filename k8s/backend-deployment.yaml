apiVersion: apps/v1
kind: Deployment
metadata:
  name: ums-backend
  namespace: ums
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ums-backend
  template:
    metadata:
      labels:
        app: ums-backend
    spec:
      containers:
        - name: backend
          image: siva603/ums-backend:latest
          envFrom:
            - secretRef:
                name: backend-secret
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: backend-logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: backend-logs
          hostPath:
            path: /root/data/backend/logs
            type: DirectoryOrCreate